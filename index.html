<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RetroToons | Clásicos Animados</title>

<!-- PWA / iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RetroToons">
<link rel="apple-touch-icon" href="https://github.com/crew37/RetrotoonsIos/blob/main/Icon.png?raw=true">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #ffcc33;
    --accent: #ff9800;
    --bg-dark: #121212;
    --card-bg: #1e1e1e;
    --text-light: #ffffff;
    --text-muted: #aaaaaa;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-dark);
    font-family: 'Poppins', sans-serif;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* SPLASH */
#splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ffcc33, #ff9800);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity .5s;
}

#splash img {
    width: 220px;
    border-radius: 20px;
}

/* Screens */
.screen {
    display: none;
    height: 100dvh;
    overflow-y: auto;
    padding-bottom: 120px;
    animation: fade .3s;
}

.active {
    display: flex;
    flex-direction: column;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* INICIO */
#inicio {
    background: linear-gradient(135deg, #ffcc33 0%, #ff9800 100%);
    color: #222;
}

#inicio header {
    padding: 40px 20px;
    text-align: center;
}

#inicio header img {
    width: 70%;
    max-width: 280px;
    border-radius: 20px;
}

#inicio main {
    flex: 1;
    background: white;
    border-radius: 40px 40px 0 0;
    padding: 30px;
    text-align: center;
}

.welcome-card h1 {
    font-size: 1.8rem;
    margin-bottom: 15px;
}

.welcome-card p {
    color: #666;
}

/* EN VIVO */
#envivo {
    background: #000;
}

#envivo header {
    text-align: center;
    padding: 15px;
    font-family: 'Orbitron';
    background: linear-gradient(to bottom, #222, #000);
    border-bottom: 2px solid var(--primary);
}

.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    background: black;
}

video {
    width: 100%;
    height: 100%;
}

.channel-info {
    padding: 20px;
}

.options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 0 20px;
}

.option-btn {
    background: var(--card-bg);
    border: 1px solid #333;
    color: white;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.option-btn.active-stream {
    border-color: var(--primary);
}

/* NAVBAR */
.navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 90px;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding-bottom: env(safe-area-inset-bottom);
    border-top: 1px solid #333;
}

.navbtn {
    color: #aaa;
    text-align: center;
    font-size: 12px;
}

.navbtn.active {
    color: var(--primary);
}

.navbtn svg {
    width: 26px;
    height: 26px;
    fill: currentColor;
}

/* FULLSCREEN VIDEO */
video:fullscreen + .navbar {
    display: none;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="https://github.com/crew37/RetrotoonsIos/blob/main/Icon.png?raw=true">
</div>

<!-- INICIO -->
<div id="inicio" class="screen active">
    <header>
        <img src="https://github.com/crew37/RetrotoonsIos/blob/main/Icon.png?raw=true">
    </header>

    <main>
        <div class="welcome-card">
            <h1>¡Bienvenido a RetroToons!</h1>
            <p>
                Tu canal favorito de caricaturas clásicas.<br>
                Disfruta de la mejor animación retro.
            </p>
        </div>
    </main>
</div>

<!-- EN VIVO -->
<div id="envivo" class="screen">
    <header>RETROTOONS TV</header>

    <div class="video-container">
        <video id="video" controls playsinline></video>
    </div>

    <div class="channel-info">
        <h2>Transmisión en Vivo</h2>
        <p>Selecciona una señal alternativa</p>
    </div>

    <div class="options-grid">
        <div class="option-btn active-stream" onclick="playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8')">
            📡 Señal Principal
        </div>

        <div class="option-btn" onclick="playStream('https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8')">
            🛰️ Señal Espejo
        </div>
    </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbtn active" onclick="showScreen('inicio')">
        <svg viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        Inicio
    </div>

    <div class="navbtn" onclick="showScreen('envivo')">
        <svg viewBox="0 0 24 24">
            <path d="M21 3H3v12h18V3zm-5 6l-7 4V5l7 4z"/>
        </svg>
        En Vivo
    </div>
</nav>

<script>
const video = document.getElementById('video');
let hls;

function showScreen(id){
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

function playStream(url){
    if(hls){ hls.destroy(); }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });
    } else {
        video.src = url;
        video.play();
    }
}

/* Splash */
window.onload = () => {
    setTimeout(()=>{
        document.getElementById('splash').style.opacity = '0';
        setTimeout(()=>{
            document.getElementById('splash').style.display = 'none';
        },500);
    },1500);

    playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8');
}
</script>

</body>
</html>
