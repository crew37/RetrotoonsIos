<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RetroToons TV PWA</title>
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroToons TV">
    <link rel="apple-touch-icon" href="Icon.png">
    
    <!-- Safe areas -->
    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --safe-left: env(safe-area-inset-left);
            --safe-right: env(safe-area-inset-right);
        }
    </style>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B5CF6">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* RESET TOTAL */
        * { 
            margin: 0 !important; 
            padding: 0 !important; 
            box-sizing: border-box !important; 
        }
        
        html, body { 
            height: 100% !important; 
            width: 100% !important; 
            overflow: hidden !important; 
        }

        /* APP - FULLSCREEN ABSOLUTO */
        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            width: 100dvw;
            display: flex;
            flex-direction: column;
            padding: 0;
            margin: 0;
        }

        /* HEADER - CUBRE NOTCH ARRIBA */
        .header {
            background: linear-gradient(135deg, #8B5CF6 0%, #5d00a8 100%);
            color: white;
            /* CUBRE NOTCH COMPLETO */
            padding-top: var(--safe-top);
            padding-left: max(1rem, var(--safe-left));
            padding-right: max(1rem, var(--safe-right));
            padding-bottom: 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(139,92,246,0.4);
            z-index: 100;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: calc(var(--safe-top) + 3rem);
        }

        .header img {
            max-width: 35%;
            max-height: 50px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* MAIN - SIN PADDING BOTTOM */
        .main-content {
            flex: 1;
            background: linear-gradient(135deg, #FCD34D 0%, #FBBF24 50%, #F59E0B 100%);
            overflow-y: auto;
            padding: 1rem;
            padding-top: 0.5rem;
            /* SIN padding-bottom - footer lo cubre todo */
            margin-bottom: 0;
        }

        .section { display: none; min-height: 100%; }
        .section.active { 
            display: block; 
            animation: fadeIn 0.3s ease-in; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CONTENIDO INICIO */
        .content {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }

        .content img {
            display: block;
            margin: 0 auto 1.5rem;
            max-width: 120px;
            height: auto;
        }

        .content p {
            font-size: 1.1rem;
            color: #1F2937;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .cards { display: grid; gap: 1rem; }
        .card {
            background: rgba(255,255,255,0.95);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .card h3 {
            color: #8B5CF6;
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        /* RETROTOONS PLAYER */
        .retrotoons-container {
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'Orbitron', sans-serif;
            max-width: 400px;
            margin: 0 auto;
        }

        .retrotoons-header {
            text-align: center;
            padding: 1rem;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #ffeb3b, #ff9800);
            color: #000;
            box-shadow: 0 0 20px #ff9800;
            flex-shrink: 0;
        }

        #player-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .retrotoons-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .retrotoons-buttons {
            display: flex;
            gap: 15px;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }

        .retrotoons-btn {
            flex: 1;
            height: 65px;
            font-size: 16px;
            border-radius: 14px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #5d00a8, #8B5CF6);
            color: white;
            box-shadow: 0 4px 15px rgba(139,92,246,0.6);
            font-weight: 500;
            cursor: pointer;
        }

        .retrotoons-btn:active { transform: scale(0.98); }

        .retrotoons-footer {
            text-align: center;
            padding: 0.8rem 1rem;
            font-size: 13px;
            color: #ffb300;
            opacity: 0.9;
            flex-shrink: 0;
        }

        /* FOOTER - CUBRE TODO ABAJO */
        .footer {
            background: linear-gradient(135deg, #8B5CF6 0%, #5d00a8 100%);
            /* CUBRE HOME INDICATOR COMPLETO */
            padding-bottom: var(--safe-bottom);
            padding-left: max(1rem, var(--safe-left));
            padding-right: max(1rem, var(--safe-right));
            padding-top: 0.5rem;
            box-shadow: 0 -8px 30px rgba(139,92,246,0.5);
            flex-shrink: 0;
            z-index: 100;
            position: relative;
            /* Altura mínima para cubrir */
            min-height: calc(70px + var(--safe-bottom));
        }

        .nav {
            display: flex;
            height: 70px;
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.4rem;
            border-radius: 12px;
        }

        .nav-btn span { font-size: 1.4rem; }

        .nav-btn.active {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            transform: scale(1.05);
        }

        .nav-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <img src="https://github.com/crew37/RetrotoonsIos/raw/main/3599392_splash.png" alt="RetroToons">
        </header>

        <main class="main-content">
            <!-- INICIO -->
            <section id="inicio" class="section active">
                <div class="content">
                    <img src="https://github.com/crew37/RetrotoonsIos/raw/main/Icon.png" alt="Icon">
                    <p>Bienvenido a <strong>RetroToons TV</strong><br>Disfruta de lo mejor de la TV retro en vivo.</p>
                    <div class="cards">
                        <div class="card">
                            <h3>📺 Canales en Vivo</h3>
                            <p>2 canales disponibles 24/7</p>
                        </div>
                        <div class="card">
                            <h3>🎮 Experiencia Retro</h3>
                            <p>Player optimizado para iPhone</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- EN VIVO -->
            <section id="envivo" class="section">
                <div class="retrotoons-container">
                    <div class="retrotoons-header">RETROTOONS TV</div>
                    <div id="player-container">
                        <video id="video" controls playsinline class="retrotoons-video"></video>
                    </div>
                    <div class="retrotoons-buttons">
                        <button class="retrotoons-btn" onclick="playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8')">
                            📺 Opción 1
                        </button>
                        <button class="retrotoons-btn" onclick="playStream('https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8')">
                            📺 Opción 2
                        </button>
                    </div>
                    <div class="retrotoons-footer">Powered by RetroToons</div>
                </div>
            </section>
        </main>

        <!-- FOOTER - CUBRE TODO ABAJO -->
        <footer class="footer">
            <nav class="nav">
                <button class="nav-btn active" data-section="inicio">
                    <span>🏠</span>
                    <span>Inicio</span>
                </button>
                <button class="nav-btn" data-section="envivo">
                    <span>🔴</span>
                    <span>En Vivo</span>
                </button>
            </nav>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.section;
                    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(target).classList.add('active');
                });
            });

            const observer = new MutationObserver(() => {
                if (document.getElementById('envivo').classList.contains('active')) {
                    setTimeout(() => playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8'), 300);
                }
            });
            observer.observe(document.getElementById('envivo'), { attributes: true });
        });

        let hls;
        function playStream(url) {
            const video = document.getElementById('video');
            if (hls) hls.destroy();
            
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            } else if (Hls.isSupported()) {
                hls = new Hls({ lowLatencyMode: true });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        }
        window.playStream = playStream;
    </script>
</body>
</html>
