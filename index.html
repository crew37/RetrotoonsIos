<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RetroToons TV</title>

<!-- PWA iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RetroToons">
<link rel="apple-touch-icon" href="Icon.png">
<link rel="apple-touch-startup-image" href="3599392_splash.png">

<meta name="theme-color" content="#6200ea">
<link rel="manifest" id="manifest-link">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
width:100%;
overflow:hidden;
background:#ffcc33;
font-family:Roboto, Arial;
}

body{
display:flex;
flex-direction:column;
height:100vh;
height:-webkit-fill-available;
}

/* SPLASH */
#splash-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffcc33;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

#splash-screen img{
width:200px;
}

/* HEADER */
header{
width:100%;
background:#6200ea;
text-align:center;
padding:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
z-index:100;
}

header img{
max-height:60px;
}

/* VIEWS */
.view-container{
flex:1;
position:relative;
width:100%;
overflow:hidden;
padding-bottom:env(safe-area-inset-bottom);
}

.view{
display:none;
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;
padding:20px;
padding-bottom:100px;
text-align:center;
}

.view.active{
display:flex;
flex-direction:column;
}

/* INICIO */
#welcome{
font-size:2em;
font-weight:bold;
margin-top:30px;
}

.quote-box{
background:rgba(255,255,255,0.5);
padding:20px;
border-radius:15px;
border:2px dashed #6200ea;
margin-top:30px;
}

/* PLAYER */
.live-view{
align-items:center;
font-family:Orbitron;
}

.player-wrapper{
width:100%;
max-width:600px;
background:#000;
border:3px solid #6200ea;
border-radius:12px;
overflow:hidden;
margin-top:10px;
}

video{
width:100%;
aspect-ratio:16/9;
background:#000;
}

/* BUTTONS */
.btn-group{
display:flex;
gap:10px;
margin-top:15px;
width:100%;
max-width:600px;
}

.btn-stream{
flex:1;
padding:15px;
background:#6200ea;
border:none;
border-radius:10px;
color:#fff;
font-weight:bold;
}

/* NAVBAR */
.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#6200ea;
display:flex;
justify-content:space-around;
padding:10px 0 calc(10px + env(safe-area-inset-bottom));
box-shadow:0 -4px 15px rgba(0,0,0,0.3);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:rgba(255,255,255,0.5);
font-size:0.75em;
font-weight:bold;
width:50%;
}

.nav-item.active{
color:#fff;
}

.nav-icon{
width:24px;
height:24px;
fill:currentColor;
margin-bottom:4px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash-screen">
<img src="3599392_splash.png">
</div>

<header>
<img src="3599392_splash.png">
</header>

<div class="view-container">

<!-- INICIO -->
<section id="inicio" class="view active">
<div id="welcome">¡Bienvenido a RetroToons!</div>

<div class="quote-box">
"¡Eso es todo amigos!"
</div>
</section>

<!-- EN VIVO -->
<section id="envivo" class="view live-view">

<h2>RETROTOONS TV</h2>

<div class="player-wrapper">
<video id="video" controls autoplay muted playsinline poster="3599392_splash.png"></video>
</div>

<div class="btn-group">
<button class="btn-stream" onclick="playStream(stream1)">OPCIÓN 1</button>
<button class="btn-stream" onclick="playStream(stream2)">OPCIÓN 2</button>
</div>

</section>
</div>

<!-- NAVBAR -->
<nav class="bottom-nav">
<div class="nav-item active" onclick="showView('inicio', this)">
<svg class="nav-icon" viewBox="0 0 24 24">
<path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
</svg>
<span>Inicio</span>
</div>

<div class="nav-item" onclick="showView('envivo', this)">
<svg class="nav-icon" viewBox="0 0 24 24">
<path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77.42-1.56.42-4.81.42-4.81s0-3.25-.42-4.81zM10 15V9l5.2 3L10 15z"/>
</svg>
<span>En Vivo</span>
</div>
</nav>

<script>
const video = document.getElementById('video');
let hls;

const stream1 = "https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8";
const stream2 = "https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8";

function showView(viewId, element){
localStorage.setItem("lastView", viewId);

document.querySelectorAll('.view').forEach(v=>{
v.classList.remove('active');
v.style.display='none';
});

const selected = document.getElementById(viewId);
selected.style.display='flex';
selected.classList.add('active');

document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
element.classList.add('active');

if(viewId==="envivo"){
playStream(stream1);
}else{
video.pause();
}
}

function playStream(url){
if(hls){hls.destroy();}

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play();
}else if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
}
}

/* RESTORE VIEW */
window.onload=()=>{
const lastView=localStorage.getItem("lastView");
if(lastView==="envivo"){
showView("envivo", document.querySelectorAll(".nav-item")[1]);
}

/* SPLASH */
setTimeout(()=>{
document.getElementById("splash-screen").style.display="none";
},2000);
};

/* MANIFEST */
const manifest={
"name":"RetroToons TV",
"short_name":"RetroToons",
"start_url":".",
"display":"standalone",
"background_color":"#ffcc33",
"theme_color":"#6200ea",
"icons":[{"src":"3599392_splash.png","sizes":"512x512","type":"image/png"}]
};
const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
document.getElementById('manifest-link').href=URL.createObjectURL(blob);

/* SERVICE WORKER */
if('serviceWorker' in navigator){
navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
self.addEventListener('fetch',e=>e.respondWith(fetch(e.request)));
`],{type:'text/javascript'})));
}
</script>

</body>
</html>
