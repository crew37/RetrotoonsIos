<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroToons - PWA</title>

    <!-- CONFIGURACIÓN PWA PARA IPHONE (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroToons">
    
    <!-- Icono para pantalla de inicio -->
    <link rel="apple-touch-icon" href="3599392_splash.png">

    <!-- Splash Screens -->
    <link rel="apple-touch-startup-image" href="3599392_splash.png">

    <!-- Librerías y Fuentes -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Color de tema para la barra superior del sistema -->
    <meta name="theme-color" content="#6200ea">
    <link rel="manifest" id="manifest-link">

    <style>
        /* Estilos base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Roboto', 'Arial', sans-serif;
            background: #ffcc33;
            color: #222;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        header {
            width: 100%;
            background: #6200ea; 
            text-align: center;
            padding: calc(10px + env(safe-area-inset-top)) 10px 10px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header img {
            max-height: 70px;
            width: auto;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }

        .view-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 90px;
        }

        .view {
            display: none;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease-in-out;
            min-height: 100%;
            position: relative;
        }

        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* INICIO */
        #inicio {
            justify-content: flex-start;
            padding-top: 40px;
        }

        #inicio h1 {
            color: #000000;
            font-size: 2.5em;
            margin-bottom: 30px;
            font-weight: 900;
        }

        .welcome-text {
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 40px;
            line-height: 1.5;
            padding: 0 10px;
        }

        .quote-box {
            background: rgba(255,255,255,0.4);
            padding: 20px;
            border-radius: 15px;
            border: 2px dashed #000;
            margin-top: 40px;
        }

        .custom-footer {
            margin-top: auto;
            padding: 20px 0;
        }

        .black-badge {
            background-color: #000000;
            color: #ffffff;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9em;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* VISTA EN VIVO */
        .live-view {
            background: radial-gradient(circle at top, #333 0%, #000 100%);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .live-indicator-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            background: #ff0000;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75em;
            animation: pulse 1.5s infinite;
        }

        .player-wrapper {
            width: 100%;
            max-width: 600px;
            background: #000;
            border: 2px solid #ffb300;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 179, 0, 0.4);
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            display: block;
            aspect-ratio: 16 / 9;
            background: #000;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            width: 100%;
            max-width: 600px;
        }

        .btn-stream {
            flex: 1;
            padding: 15px 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8em;
            background: linear-gradient(180deg, #ffeb3b, #ff9800);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            box-shadow: 0 4px 0 #b26a00;
        }

        /* Navbar */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #6200ea; 
            display: flex;
            justify-content: space-around;
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255, 255, 255, 0.5); 
            font-size: 0.75em;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 50%;
        }

        .nav-item.active {
            color: #ffffff; 
            transform: scale(1.05);
        }

        .nav-icon { 
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            fill: currentColor; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header id="main-header">
        <img src="3599392_splash.png" alt="RetroToons! Logo">
    </header>

    <div class="view-container">
        <!-- SECCIÓN: INICIO -->
        <section id="inicio" class="view active">
            <h1>¡Bienvenido!</h1>
            
            <p class="welcome-text">
                Tu canal favorito de caricaturas clásicas.<br>
                Revive los mejores momentos de la animación retro.
            </p>
            
            <div class="quote-box">
                <p style="font-style: italic; font-weight: bold;">"¡Eso es todo amigos!"</p>
            </div>

            <div class="custom-footer">
                <div class="black-badge">
                    © 2025 RetroToons
                </div>
            </div>
        </section>

        <!-- SECCIÓN: EN VIVO -->
        <section id="envivo" class="view live-view">
            <div class="live-indicator-container">
                <div class="live-indicator">● EN VIVO</div>
            </div>
            
            <h2 style="font-size: 1.2em; margin-bottom: 15px; letter-spacing: 1px;">RETROTOONS TV</h2>
            
            <div class="player-wrapper">
                <video id="video" controls playsinline poster="3599392_splash.png"></video>
            </div>

            <div class="btn-group">
                <button class="btn-stream" onclick="playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8')">
                    📺 OPCIÓN 1
                </button>
                <button class="btn-stream" onclick="playStream('https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8')">
                    📺 OPCIÓN 2
                </button>
            </div>
        </section>
    </div>

    <!-- NAVBAR VIOLETA -->
    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="showView('inicio', this)">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span>Inicio</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="showView('envivo', this)">
            <svg class="nav-icon" viewBox="0 0 24 24">
                <path d="M21.58 7.19c-.23-.86-.91-1.54-1.77-1.77C18.25 5 12 5 12 5s-6.25 0-7.81.42c-.86.23-1.54.91-1.77 1.77C2 8.75 2 12 2 12s0 3.25.42 4.81c.23.86.91 1.54 1.77 1.77C5.75 19 12 19 12 19s6.25 0 7.81-.42c.86-.23 1.54-.91 1.77-1.77.42-1.56.42-4.81.42-4.81s0-3.25-.42-4.81zM10 15V9l5.2 3L10 15z"/>
            </svg>
            <span>En Vivo</span>
        </a>
    </nav>

    <script>
        const video = document.getElementById('video');
        let hls;

        function showView(viewId, element) {
            document.querySelectorAll('.view').forEach(v => {
                v.style.display = 'none';
                v.classList.remove('active');
            });
            const selectedView = document.getElementById(viewId);
            selectedView.style.display = 'flex';
            selectedView.classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            if(viewId === 'envivo') {
                playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8');
            } else {
                video.pause();
            }
        }

        function playStream(url) {
            if (hls) { hls.destroy(); hls = null; }
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log("Reproducción bloqueada por el navegador"));
            } else if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log("Reproducción bloqueada por el navegador")));
            }
        }

        // Generar Manifest dinámicamente
        const manifest = {
            "name": "RetroToons TV",
            "short_name": "RetroToons",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#6200ea",
            "theme_color": "#6200ea",
            "icons": [{ "src": "3599392_splash.png", "sizes": "512x512", "type": "image/png" }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/manifest+json'});
        document.getElementById('manifest-link').setAttribute('href', URL.createObjectURL(manifestBlob));

        // --- SISTEMA DE ACTUALIZACIÓN Y SERVICE WORKER ---
        // Se añade un bloque try-catch para manejar entornos donde Blob URLs no son permitidas para SW
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const CACHE_VERSION = 'v1.3'; 
                
                const swCode = `
                    const CACHE_NAME = 'retrotoons-cache-${CACHE_VERSION}';
                    self.addEventListener('install', e => {
                        self.skipWaiting();
                    });
                    self.addEventListener('activate', e => {
                        e.waitUntil(
                            caches.keys().then(keys => Promise.all(
                                keys.map(key => {
                                    if (key !== CACHE_NAME) return caches.delete(key);
                                })
                            ))
                        );
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                    });
                `;
                
                try {
                    const swBlob = new Blob([swCode], {type: 'application/javascript'});
                    const swUrl = URL.createObjectURL(swBlob);

                    navigator.serviceWorker.register(swUrl).then(reg => {
                        console.log('SW registrado con éxito');
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    window.location.reload();
                                }
                            };
                        };
                    }).catch(err => {
                        // Si falla por el protocolo blob (común en iframes de previsualización), lo ignoramos silenciosamente
                        // ya que la app seguirá funcionando como una web normal.
                        console.warn('El registro del Service Worker falló (posiblemente por restricciones de entorno/iframe):', err);
                    });
                } catch (e) {
                    console.error('Error al intentar crear el Service Worker Blob:', e);
                }
            });
        }
    </script>
</body>
</html>
