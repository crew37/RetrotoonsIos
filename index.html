<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroToons TV PWA</title>
    
    <!-- iOS PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroToons TV">
    <link rel="apple-touch-icon" href="Icon.png">
    
    <!-- Android PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8B5CF6">
    
    <!-- HLS.js para streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS EMBEBIDOS PARA SIMPLIFICAR DESPLIEGUE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Violeta */
        .header {
            background: linear-gradient(135deg, #8B5CF6 0%, #5d00a8 100%);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        /* Contenido Principal Amarillo */
        .main-content {
            flex: 1;
            background: linear-gradient(135deg, #FCD34D 0%, #FBBF24 50%, #F59E0B 100%);
            overflow-y: auto;
            padding: 1rem;
        }

        .section {
            display: none;
            min-height: 100%;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ESTILOS INICIO */
        .content {
            max-width: 400px;
            margin: 0 auto;
        }

        .content h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #1F2937;
            text-align: center;
        }

        .cards {
            display: grid;
            gap: 1rem;
            margin-top: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .card h3 {
            color: #8B5CF6;
            margin-bottom: 0.5rem;
        }

        /* ESTILOS RETROTOONS EN VIVO */
        .retrotoons-container {
            max-width: 400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            font-family: 'Orbitron', sans-serif !important;
            padding: 0 !important;
        }

        .retrotoons-header {
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #ffeb3b, #ff9800);
            color: #000;
            box-shadow: 0 0 20px #ff9800;
            flex-shrink: 0;
        }

        #player-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }

        .retrotoons-video {
            width: 100%;
            height: 100%;
            max-height: 45vh;
            object-fit: contain;
            background: #000;
        }

        .retrotoons-buttons {
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 20px;
        }

        .retrotoons-btn {
            flex: 1;
            height: 70px;
            font-size: 18px;
            border-radius: 14px;
            border: none;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(180deg, #5d00a8, #5d00a8);
            color: #000;
            box-shadow: 0 0 12px rgba(255,152,0,.8);
            cursor: pointer;
            font-weight: 500;
        }

        .retrotoons-btn:active {
            transform: scale(0.97);
        }

        .retrotoons-footer {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            color: #ffb300;
            opacity: 0.8;
            flex-shrink: 0;
        }

        /* Footer Violeta */
        .footer {
            background: linear-gradient(135deg, #8B5CF6 0%, #5d00a8 100%);
            box-shadow: 0 -2px 10px rgba(139, 92, 246, 0.3);
        }

        .nav {
            display: flex;
            height: 70px;
            max-width: 400px;
            margin: 0 auto;
        }

        .nav-btn {
            flex: 1;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0.5rem;
        }

        .nav-btn.active {
            color: white;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header Violeta -->
        <header class="header">
            <img src="https://github.com/crew37/RetrotoonsIos/blob/main/3599392_splash.png?raw=true" style="display: block; margin: 0 auto; max-width: 100%; height: auto;">

        </header>

        <!-- Contenido Principal -->
        <main class="main-content">
            <!-- Sección Inicio -->
            <section id="inicio" class="section active">
                <div class="content">
                    <div style="display: flex; justify-content: center;">
 <img src="https://github.com/crew37/RetrotoonsIos/blob/main/Icon.png?raw=true" style="display: block; margin: 0 auto; max-width: 100%; height: auto;">

</div>

                    <p>Bienvenido a RetroToons TV. Disfruta de lo mejor de la TV retro en vivo.</p>
                    <div class="cards">
                        <div class="card">
                            <h3>📺 Canales en Vivo</h3>
                            <p>2 canales disponibles 24/7</p>
                        </div>
                        <div class="card">
                            <h3>🎮 Experiencia Retro</h3>
                            <p>Player optimizado para iPhone</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Sección En Vivo - RETROTOONS TV -->
            <section id="envivo" class="section">
                <div class="retrotoons-container">
                    <!-- HEADER RETROTOONS -->
                    <div class="retrotoons-header">
                        RETROTOONS TV
                    </div>

                    <!-- PLAYER CONTAINER -->
                    <div id="player-container">
                        <video id="video" controls playsinline class="retrotoons-video"></video>
                    </div>

                    <!-- BOTONES DE CANALES -->
                    <div id="buttons" class="retrotoons-buttons">
                        <button class="retrotoons-btn" onclick="playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8')">
                            📺 Opción 1
                        </button>
                        <button class="retrotoons-btn" onclick="playStream('https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8')">
                            📺 Opción 2
                        </button>
                    </div>

                    <!-- FOOTER -->
                    <div class="retrotoons-footer">
                        Powered by RetroToons
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer Violeta con Navegación -->
        <footer class="footer">
            <nav class="nav">
                <button class="nav-btn active" data-section="inicio">
                    <span>🏠</span>
                    <span>Inicio</span>
                </button>
                <button class="nav-btn" data-section="envivo">
                    <span>🔴</span>
                    <span>En Vivo</span>
                </button>
            </nav>
        </footer>
    </div>

    <script>
        // Navegación entre secciones
        document.addEventListener('DOMContentLoaded', function() {
            const navBtns = document.querySelectorAll('.nav-btn');
            const sections = document.querySelectorAll('.section');

            navBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetSection = btn.dataset.section;
                    
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    sections.forEach(section => {
                        section.classList.remove('active');
                        if (section.id === targetSection) {
                            section.classList.add('active');
                        }
                    });
                });
            });

            // Auto-play cuando entra en En Vivo
            const envivoSection = document.getElementById('envivo');
            const observer = new MutationObserver(function() {
                if (envivoSection.classList.contains('active')) {
                    setTimeout(() => {
                        if (document.getElementById('video')) {
                            playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8');
                        }
                    }, 500);
                }
            });
            observer.observe(envivoSection, { attributes: true });
        });

        // RETROTOONS PLAYER
        let hls;
        function playStream(url) {
            const video = document.getElementById('video');
            
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            } else if (Hls.isSupported()) {
                hls = new Hls({
                    lowLatencyMode: true,
                    backBufferLength: 30
                });

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    console.log("HLS error:", data);
                });
            } else {
                alert('Este dispositivo no soporta streaming HLS');
            }
        }

        // Hacer función global
        window.playStream = playStream;
    </script>
</body>
</html>
