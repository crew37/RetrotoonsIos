<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RetroToons TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #222 0%, #000 60%);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* SPLASH */
#splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #ffeb3b, #ff9800);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    color: #000;
    z-index: 9999;
}

/* HEADER */
header {
    text-align: center;
    padding: 10px;
    font-size: 22px;
    background: linear-gradient(90deg, #ffeb3b, #ff9800);
    color: #000;
    box-shadow: 0 0 20px #ff9800;
}

/* PLAYER */
#player-container {
    background: #000;
}

video {
    width: 100%;
    height: auto;
    max-height: 45vh;
    background: #000;
}

/* BUTTONS */
#buttons {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 20px;
}

button {
    width: 45%;
    height: 70px;
    font-size: 18px;
    border-radius: 14px;
    border: none;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(180deg, #ffeb3b, #ff9800);
    color: #000;
    box-shadow: 0 0 12px rgba(255,152,0,.8);
    transition: 0.2s;
}

button.active {
    background: linear-gradient(180deg, #fff176, #ffb74d);
    box-shadow: 0 0 20px #fff176;
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

footer {
    text-align: center;
    padding: 6px;
    font-size: 12px;
    color: #ffb300;
    opacity: .7;
}
</style>
</head>

<body>

<div id="splash">RETROTOONS TV</div>

<header>RETROTOONS TV</header>

<div id="player-container">
    <video id="video" controls playsinline></video>
</div>

<div id="buttons">
    <button id="btn1" onclick="playStream(1)">
        📺 Opción 1
    </button>

    <button id="btn2" onclick="playStream(2)">
        📺 Opción 2
    </button>
</div>

<footer>Powered by RetroToons</footer>

<script>
const video = document.getElementById('video');
let hls;

const streams = {
    1: 'https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8',
    2: 'https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8'
};

function setActiveButton(id){
    document.getElementById('btn1').classList.remove('active');
    document.getElementById('btn2').classList.remove('active');
    document.getElementById('btn'+id).classList.add('active');
}

function playStream(id) {
    const url = streams[id];
    setActiveButton(id);

    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    } else if (Hls.isSupported()) {
        hls = new Hls({
            lowLatencyMode: true,
            backBufferLength: 30
        });

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });
    } else {
        alert('Este dispositivo no soporta HLS');
    }
}

/* FULLSCREEN AL TOCAR VIDEO */
video.addEventListener('click', () => {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
});

/* SPLASH + CANAL POR DEFECTO */
window.addEventListener('load', () => {
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        playStream(1);
    }, 2000);
});
</script>

</body>
</html>>
