<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>RetroToons</title>

<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RetroToons">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<!-- Splash iPhone 14 Pro -->
<link rel="apple-touch-startup-image" href="splash/iphone14pro.png"
media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    font-family: Arial, sans-serif;
}

/* Pantallas */
.screen {
    display: none;
    min-height: 100vh;
    padding-bottom: 90px;
}
.active {
    display: block;
}

/* ================= INICIO ================= */
#inicio {
    background: #ffcc33;
    color: #222;
    display: flex;
    flex-direction: column;
}

#inicio header {
    width: 100%;
    background: #ffb300;
    text-align: center;
    padding: 20px 10px;
}

#inicio header img {
    max-width: 300px;
    width: 80%;
}

#inicio main {
    text-align: center;
    padding: 40px 20px;
}

#inicio footer {
    margin-top: auto;
    width: 100%;
    text-align: center;
    padding: 15px;
    background: #222;
    color: #fff;
}

/* ================= EN VIVO ================= */
#envivo {
    background: radial-gradient(circle at top, #222 0%, #000 60%);
    color: #fff;
    font-family: 'Orbitron', sans-serif;
}

#envivo header {
    text-align: center;
    padding: 10px;
    font-size: 22px;
    background: linear-gradient(90deg, #ffeb3b, #ff9800);
    color: #000;
}

video {
    width: 100%;
    max-height: 45vh;
    background: #000;
}

#buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

#buttons button {
    width: 45%;
    height: 70px;
    font-size: 18px;
    border-radius: 14px;
    border: none;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(180deg, #ffeb3b, #ff9800);
    color: #000;
}

/* ================= NAVBAR ================= */
.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 75px;
    background: #111;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #333;
}

.navbtn {
    color: white;
    font-size: 13px;
    text-align: center;
}

.navbtn span {
    display: block;
    font-size: 22px;
}
</style>
</head>

<body>

<!-- ================= INICIO ================= -->
<div id="inicio" class="screen active">
    <header>
        <img src="https://i.ibb.co/tPHM2bMt/icono.png">
    </header>

    <main>
        <h1>¡Bienvenido a RetroToons!</h1>
        <p>
            Tu canal favorito de caricaturas clásicas.<br>
            Disfruta de la mejor animación retro.
        </p>
    </main>

    <footer>
        © 2025 RetroToons
    </footer>
</div>

<!-- ================= EN VIVO ================= -->
<div id="envivo" class="screen">
    <header>RETROTOONS TV</header>

    <video id="video" controls playsinline></video>

    <div id="buttons">
        <button onclick="playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8')">
            📺 Opción 1
        </button>

        <button onclick="playStream('https://live20.bozztv.com/giatv/giatv-Retrotoonstv/Retrotoonstv/chunks.m3u8')">
            📺 Opción 2
        </button>
    </div>
</div>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <div class="navbtn" onclick="showScreen('inicio')">
        <span>🏠</span>
        Inicio
    </div>
    <div class="navbtn" onclick="showScreen('envivo')">
        <span>📺</span>
        En Vivo
    </div>
</div>

<script>
function showScreen(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screen).classList.add('active');
}

const video = document.getElementById('video');
let hls;

function playStream(url) {
    if (hls) {
        hls.destroy();
        hls = null;
    }

    if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    } else if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play();
        });
    }
}

/* Canal automático */
window.addEventListener('load', () => {
    playStream('https://live20.bozztv.com/akamaissh101/ssh101/retrotoons/chunks.m3u8');
});

/* Service Worker */
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
